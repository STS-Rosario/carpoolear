services:
  carpoolear_frontend:
    build:
      context: .
      target: dev
    tty: true
    container_name: ${CONTAINER_PREFIX:-carpoolear}_frontend
    command: npx vite --host 0.0.0.0
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000}
      VITE_WEB_URL: ${WEB_URL:-https://carpoolear.com.ar/app}
      VITE_MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY:-}
    ports:
      - ${FRONTEND_PORT:-8080}:8080
    networks:
      - esnet
    volumes:
      - .:/app
      - /app/node_modules
networks:
  esnet:
    driver: bridge
